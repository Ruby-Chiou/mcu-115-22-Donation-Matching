<div class="container">
  <h1>批次修改急難需求</h1>

  <div class="form-box" *ngFor="let demand of editDemands; let i=index">
    <h2>第 {{i + 1}} 筆需求</h2>

    <!-- 需求物 -->

    <label>
      需求物
      <span class="required">*</span>
    </label>

    <input class="short-input" [class.invalid]="demand.itemError" type="text" placeholder="請輸入需求物" [(ngModel)]="demand.item" />

    <!-- 需求數量 -->

    <label>
      需求數量
      <span class="required">*</span>
    </label>

    <div class="amount-box">
      <input
        class="short-input"
        [class.invalid]="demand.amountError"
        type="number"
        min="0"
        placeholder="請輸入數量"
        [(ngModel)]="demand.amount"
      />

      <input class="short-input" type="text" placeholder="單位名稱，例如：箱、袋、包" [(ngModel)]="demand.unit" />
    </div>

    <!-- 數量描述 -->

    <label> 數量描述 </label>

    <textarea placeholder="例如：1箱內含10包，每包5公斤" [(ngModel)]="demand.amountDescription"> </textarea>

    <!-- 需求原因 -->

    <label>
      需求原因
      <span class="required">*</span>
    </label>

    <textarea [class.invalid]="demand.reasonError" placeholder="請輸入需求原因" [(ngModel)]="demand.reason"> </textarea>

    <!-- 需求描述 -->

    <label>
      需求描述
      <span class="required">*</span>
    </label>

    <textarea
      [class.invalid]="demand.descriptionError"
      placeholder="請輸入需求描述，例如可接受誤差程度、特定型號、款式等"
      [(ngModel)]="demand.description"
    >
    </textarea>

    <!-- 物品完好度 -->

    <label> 物品完好度 </label>

    <div class="condition-box">
      <label *ngFor="let condition of conditionList">
        <input type="checkbox" [checked]="demand.conditions?.includes(condition)" (change)="toggleCondition(demand, condition)" />

        {{condition}}
      </label>
    </div>

    <!-- 自訂狀態 -->

    <input class="medium-input" type="text" placeholder="其他物品狀態（可自行輸入）" [(ngModel)]="demand.customCondition" />

    <!-- 緊急優先度 -->

    <label>
      緊急優先度
      <span class="required">*</span>
    </label>

    <div class="priority-box">
      <label class="normal">
        <input type="radio" [name]="'priority'+i" value="普通" [(ngModel)]="demand.priority" />

        普通
      </label>

      <label class="urgent">
        <input type="radio" [name]="'priority'+i" value="緊急" [(ngModel)]="demand.priority" />

        緊急
      </label>

      <label class="very-urgent">
        <input type="radio" [name]="'priority'+i" value="非常緊急" [(ngModel)]="demand.priority" />

        非常緊急
      </label>
    </div>

    <!-- 接收物資地點 -->

    <label>
      能夠接收物資的地點
      <span class="required">*</span>
    </label>

    <input
      class="medium-input"
      [class.invalid]="demand.addressError"
      type="text"
      placeholder="請輸入能夠接收物資的地點"
      [(ngModel)]="demand.address"
    />

    <!-- 聯絡電話 -->

    <label>
      可保持暢通的聯絡號碼
      <span class="required">*</span>
    </label>

    <input
      class="phone-input"
      [class.invalid]="demand.phoneError"
      type="tel"
      placeholder="請輸入可保持暢通的號碼（方便聯絡時間可註明）"
      [(ngModel)]="demand.phone"
    />

    <!-- 其他說明 -->

    <label> 其他說明（備註） </label>

    <textarea placeholder="請輸入其他說明" [(ngModel)]="demand.note"> </textarea>

    <hr />
  </div>

  <!-- 按鈕 -->

  <div class="button-area">
    <button class="back-btn" (click)="cancel()">取消</button>

    <button class="save-btn" (click)="saveAll()">儲存全部修改</button>
  </div>
</div>
